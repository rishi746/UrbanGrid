<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UrbanGrid — ER Diagram</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      overflow: hidden;
      height: 100vh;
    }

    /* Top bar */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 54px;
      background: rgba(18,18,32,0.92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
    }
    .topbar h1 {
      font-size: 16px; font-weight: 700;
      background: linear-gradient(135deg,#6ee7b7,#3b82f6);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .topbar .controls { display: flex; gap: 8px; }
    .topbar button {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: #ccc; border-radius: 8px;
      padding: 6px 14px; cursor: pointer;
      font-size: 13px; font-family: inherit;
      transition: all .2s;
    }
    .topbar button:hover { background: rgba(255,255,255,0.12); color: #fff; }

    /* Legend */
    .legend {
      position: fixed; bottom: 20px; left: 20px; z-index: 100;
      background: rgba(18,18,32,0.92);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 16px 20px;
      font-size: 12px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .legend .title { font-weight: 700; font-size: 13px; margin-bottom: 4px; color: #a5b4fc; }
    .legend-item { display: flex; align-items: center; gap: 8px; }
    .legend-item .shape {
      width: 22px; height: 16px; border-radius: 3px; flex-shrink: 0;
    }
    .legend-item .diamond {
      width: 20px; height: 20px;
      transform: rotate(45deg);
      border-radius: 3px; flex-shrink: 0;
    }

    /* Canvas */
    #canvas {
      position: absolute; top: 54px; left: 0; right: 0; bottom: 0;
      cursor: grab;
    }
    #canvas:active { cursor: grabbing; }

    /* SVG styles */
    .entity-rect {
      rx: 6; ry: 6;
      stroke-width: 2;
    }
    .entity-label {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 13px;
      fill: #fff;
      text-anchor: middle;
      dominant-baseline: central;
      pointer-events: none;
    }
    .attr-ellipse {
      stroke-width: 1.5;
      opacity: 0.85;
    }
    .attr-label {
      font-family: 'Inter', sans-serif;
      font-size: 9.5px;
      fill: #d1d5db;
      text-anchor: middle;
      dominant-baseline: central;
      pointer-events: none;
    }
    .attr-label.pk {
      text-decoration: underline;
      font-weight: 600;
    }
    .rel-diamond {
      stroke-width: 2;
    }
    .rel-label {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 10px;
      fill: #fff;
      text-anchor: middle;
      dominant-baseline: central;
      pointer-events: none;
    }
    .card-label {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 700;
      fill: #facc15;
      text-anchor: middle;
      dominant-baseline: central;
    }
    .rel-line {
      stroke-width: 1.5;
      stroke: rgba(255,255,255,0.25);
      fill: none;
    }
  </style>
</head>
<body>

<div class="topbar">
  <h1>🌆 UrbanGrid — Entity-Relationship Diagram</h1>
  <div class="controls">
    <button onclick="zoomIn()">＋ Zoom In</button>
    <button onclick="zoomOut()">− Zoom Out</button>
    <button onclick="resetView()">⟳ Reset</button>
  </div>
</div>

<div class="legend">
  <div class="title">Legend</div>
  <div class="legend-item"><div class="shape" style="background:#3b82f6;"></div> Entity (Table)</div>
  <div class="legend-item"><div class="diamond" style="background:#f59e0b;width:14px;height:14px;"></div> Relationship</div>
  <div class="legend-item"><div class="shape" style="background:rgba(99,102,241,0.35);border:1.5px solid #818cf8;border-radius:50%;width:18px;height:14px;"></div> Attribute</div>
  <div class="legend-item"><div class="shape" style="background:transparent;border-bottom:2px solid #facc15;border-radius:0;width:18px;height:0;margin-top:7px;"></div> <u>Underline</u> = Primary Key</div>
  <div class="legend-item"><span style="color:#facc15;font-weight:700;">1</span>&nbsp;/&nbsp;<span style="color:#facc15;font-weight:700;">N</span> Cardinality</div>
</div>

<svg id="canvas" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="entityGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="relGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <g id="world"></g>
</svg>

<script>
// ========== DATA DEFINITION ==========

const entities = [
  { id: 'ministries',       label: 'MINISTRIES',        x: 250,  y: 120,  w: 140, h: 44, attrs: ['id','name','code','description','is_active'], pk: 'id' },
  { id: 'departments',      label: 'DEPARTMENTS',       x: 600,  y: 120,  w: 150, h: 44, attrs: ['id','ministry_id','name','code','responsibilities','is_active'], pk: 'id' },
  { id: 'users',            label: 'USERS',             x: 1000, y: 120,  w: 120, h: 44, attrs: ['id','name','email','password','role','phone','address','pincode','ward_no','is_active'], pk: 'id' },
  { id: 'regions',          label: 'REGIONS',           x: 600,  y: 380,  w: 130, h: 44, attrs: ['id','name','pin_codes','manager_id','department_id','is_active'], pk: 'id' },
  { id: 'contractors',      label: 'CONTRACTORS',       x: 1380, y: 120,  w: 150, h: 44, attrs: ['id','user_id','company_name','registration_number','gst_number','specializations','rating','is_verified'], pk: 'id' },
  { id: 'user_settings',    label: 'USER_SETTINGS',     x: 1000, y: 900,  w: 155, h: 44, attrs: ['id','user_id','theme','language','email_notif','sms_notif','push_notif'], pk: 'id' },
  { id: 'login_attempts',   label: 'LOGIN_ATTEMPTS',    x: 1300, y: 900,  w: 165, h: 44, attrs: ['id','user_id','email','ip_address','user_agent','was_successful'], pk: 'id' },
  { id: 'complaints',       label: 'COMPLAINTS',        x: 250,  y: 380,  w: 150, h: 44, attrs: ['id','complaint_id','citizen_id','title','description','category','images','address','pin_code','ward_no','status'], pk: 'id' },
  { id: 'complaint_votes',  label: 'COMPLAINT_VOTES',   x: 250,  y: 640,  w: 175, h: 44, attrs: ['id','complaint_id','voter_user_id','ward_no','vote_value'], pk: 'id' },
  { id: 'tenders',          label: 'TENDERS',           x: 250,  y: 900,  w: 130, h: 44, attrs: ['id','tender_id','complaint_id','ministry_id','department_id','title','estimated_budget','status','winning_bid_id','created_by'], pk: 'id' },
  { id: 'tender_approvals', label: 'TENDER_APPROVALS',  x: 560,  y: 1150, w: 185, h: 44, attrs: ['id','tender_id','level','approver_id','status','comments'], pk: 'id' },
  { id: 'bids',             label: 'BIDS',              x: 700,  y: 640,  w: 120, h: 44, attrs: ['id','tender_id','contractor_id','amount','proposal','status','reviewed_by'], pk: 'id' },
  { id: 'projects',         label: 'PROJECTS',          x: 1050, y: 500,  w: 130, h: 44, attrs: ['id','project_id','tender_id','complaint_id','contractor_id','title','status','allocated_budget','progress_percentage'], pk: 'id' },
  { id: 'progress_updates', label: 'PROGRESS_UPDATES',  x: 1400, y: 500,  w: 180, h: 44, attrs: ['id','project_id','update_type','title','description','percentage_complete','submitted_by'], pk: 'id' },
  { id: 'verifications',    label: 'VERIFICATIONS',     x: 1050, y: 700,  w: 160, h: 44, attrs: ['id','project_id','complaint_id','verification_type','status','verified_by','rating','recommendation'], pk: 'id' },
  { id: 'city_reports',     label: 'CITY_REPORTS',      x: 1400, y: 700,  w: 150, h: 44, attrs: ['id','generated_by','report_type','report_data'], pk: 'id' },
  { id: 'alerts',           label: 'ALERTS',            x: 1400, y: 900,  w: 120, h: 44, attrs: ['id','source_type','source_id','alert_level','message','status','resolved_by'], pk: 'id' },
];

const relationships = [
  // ministry - department
  { id: 'r1', label: 'HAS', from: 'ministries', to: 'departments', cardFrom: '1', cardTo: 'N', x: 425, y: 120 },
  // department - users
  { id: 'r2', label: 'EMPLOYS', from: 'departments', to: 'users', cardFrom: '1', cardTo: 'N', x: 800, y: 120 },
  // ministry - users
  { id: 'r3', label: 'BELONGS_TO', from: 'users', to: 'ministries', cardFrom: 'N', cardTo: '1', x: 625, y: 30 },
  // users - contractors
  { id: 'r4', label: 'ACTS_AS', from: 'users', to: 'contractors', cardFrom: '1', cardTo: '1', x: 1190, y: 120 },
  // users - user_settings
  { id: 'r5', label: 'CONFIGURES', from: 'users', to: 'user_settings', cardFrom: '1', cardTo: '1', x: 1000, y: 810 },
  // users - login_attempts
  { id: 'r6', label: 'LOGS', from: 'users', to: 'login_attempts', cardFrom: '1', cardTo: 'N', x: 1150, y: 810 },
  // department - regions
  { id: 'r7', label: 'MANAGES', from: 'departments', to: 'regions', cardFrom: '1', cardTo: 'N', x: 600, y: 250 },
  // users - regions (manager)
  { id: 'r8', label: 'OVERSEES', from: 'users', to: 'regions', cardFrom: '1', cardTo: 'N', x: 830, y: 300 },
  // users - complaints (citizen submits)
  { id: 'r9', label: 'SUBMITS', from: 'users', to: 'complaints', cardFrom: '1', cardTo: 'N', x: 620, y: 460 },
  // complaints - regions
  { id: 'r10', label: 'LOCATED_IN', from: 'complaints', to: 'regions', cardFrom: 'N', cardTo: '1', x: 425, y: 380 },
  // complaints - ministries
  { id: 'r11', label: 'ASSIGNED_TO', from: 'complaints', to: 'ministries', cardFrom: 'N', cardTo: '1', x: 250, y: 250 },
  // complaints - complaint_votes
  { id: 'r12', label: 'RECEIVES', from: 'complaints', to: 'complaint_votes', cardFrom: '1', cardTo: 'N', x: 250, y: 510 },
  // complaints - tenders
  { id: 'r13', label: 'GENERATES', from: 'complaints', to: 'tenders', cardFrom: '1', cardTo: '1', x: 250, y: 640 },
  // tenders - ministries
  { id: 'r14', label: 'ISSUED_BY', from: 'tenders', to: 'ministries', cardFrom: 'N', cardTo: '1', x: 100, y: 510 },
  // tenders - tender_approvals
  { id: 'r15', label: 'REQUIRES', from: 'tenders', to: 'tender_approvals', cardFrom: '1', cardTo: 'N', x: 400, y: 1030 },
  // tenders - bids
  { id: 'r16', label: 'ATTRACTS', from: 'tenders', to: 'bids', cardFrom: '1', cardTo: 'N', x: 475, y: 770 },
  // bids - contractors
  { id: 'r17', label: 'PLACES', from: 'contractors', to: 'bids', cardFrom: '1', cardTo: 'N', x: 1050, y: 380 },
  // projects - tenders
  { id: 'r18', label: 'ORIGINATES', from: 'tenders', to: 'projects', cardFrom: '1', cardTo: '1', x: 650, y: 900 },
  // projects - contractors
  { id: 'r19', label: 'EXECUTES', from: 'contractors', to: 'projects', cardFrom: '1', cardTo: 'N', x: 1250, y: 310 },
  // projects - progress_updates
  { id: 'r20', label: 'TRACKS', from: 'projects', to: 'progress_updates', cardFrom: '1', cardTo: 'N', x: 1225, y: 500 },
  // projects - verifications
  { id: 'r21', label: 'VERIFIED_BY', from: 'projects', to: 'verifications', cardFrom: '1', cardTo: 'N', x: 1050, y: 600 },
  // users - city_reports
  { id: 'r22', label: 'CREATES', from: 'users', to: 'city_reports', cardFrom: '1', cardTo: 'N', x: 1250, y: 700 },
  // users - alerts (resolved_by)
  { id: 'r23', label: 'RESOLVES', from: 'users', to: 'alerts', cardFrom: '1', cardTo: 'N', x: 1300, y: 810 },
];

// ========== RENDERING ==========
const svg = document.getElementById('canvas');
const world = document.getElementById('world');

let scale = 0.72, panX = 30, panY = 20;
let isPanning = false, startX, startY;

function updateTransform() {
  world.setAttribute('transform', `translate(${panX},${panY}) scale(${scale})`);
}
updateTransform();

// Pan & zoom
svg.addEventListener('mousedown', e => { isPanning = true; startX = e.clientX - panX; startY = e.clientY - panY; });
svg.addEventListener('mousemove', e => { if (!isPanning) return; panX = e.clientX - startX; panY = e.clientY - startY; updateTransform(); });
svg.addEventListener('mouseup',   () => isPanning = false);
svg.addEventListener('mouseleave',() => isPanning = false);
svg.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? -0.05 : 0.05;
  scale = Math.min(3, Math.max(0.15, scale + delta));
  updateTransform();
}, { passive: false });

function zoomIn()  { scale = Math.min(3, scale + 0.15); updateTransform(); }
function zoomOut() { scale = Math.max(0.15, scale - 0.15); updateTransform(); }
function resetView(){ scale = 0.72; panX = 30; panY = 20; updateTransform(); }

// helpers
function getEntityCenter(id) {
  const e = entities.find(en => en.id === id);
  return { x: e.x + e.w/2, y: e.y + e.h/2 };
}

// draw relationship lines FIRST (behind everything)
relationships.forEach(r => {
  const fc = getEntityCenter(r.from);
  const tc = getEntityCenter(r.to);
  const rx = r.x, ry = r.y;

  // line from entity-from to diamond
  const l1 = document.createElementNS('http://www.w3.org/2000/svg','line');
  l1.setAttribute('x1', fc.x); l1.setAttribute('y1', fc.y);
  l1.setAttribute('x2', rx);   l1.setAttribute('y2', ry);
  l1.classList.add('rel-line');
  world.appendChild(l1);

  // line from diamond to entity-to
  const l2 = document.createElementNS('http://www.w3.org/2000/svg','line');
  l2.setAttribute('x1', rx);   l2.setAttribute('y1', ry);
  l2.setAttribute('x2', tc.x); l2.setAttribute('y2', tc.y);
  l2.classList.add('rel-line');
  world.appendChild(l2);

  // cardinality labels — position near the entity end
  function cardPos(ex, ey, dx, dy) {
    const frac = 0.18;
    return { x: ex + (dx - ex) * frac, y: ey + (dy - ey) * frac - 10 };
  }
  const cp1 = cardPos(fc.x, fc.y, rx, ry);
  const cp2 = cardPos(tc.x, tc.y, rx, ry);

  const ct1 = document.createElementNS('http://www.w3.org/2000/svg','text');
  ct1.setAttribute('x', cp1.x); ct1.setAttribute('y', cp1.y);
  ct1.classList.add('card-label');
  ct1.textContent = r.cardFrom;
  world.appendChild(ct1);

  const ct2 = document.createElementNS('http://www.w3.org/2000/svg','text');
  ct2.setAttribute('x', cp2.x); ct2.setAttribute('y', cp2.y);
  ct2.classList.add('card-label');
  ct2.textContent = r.cardTo;
  world.appendChild(ct2);
});

// draw relationship diamonds
relationships.forEach(r => {
  const ds = 26; // half-diagonal
  const pts = `${r.x},${r.y-ds} ${r.x+ds},${r.y} ${r.x},${r.y+ds} ${r.x-ds},${r.y}`;
  const poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
  poly.setAttribute('points', pts);
  poly.setAttribute('fill', 'url(#relGrad)');
  poly.setAttribute('stroke', '#fbbf24');
  poly.classList.add('rel-diamond');
  poly.setAttribute('filter', 'url(#glow)');
  world.appendChild(poly);

  const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
  txt.setAttribute('x', r.x); txt.setAttribute('y', r.y);
  txt.classList.add('rel-label');
  txt.textContent = r.label;
  world.appendChild(txt);
});

// draw attributes (ovals) around entities
entities.forEach(e => {
  const cx = e.x + e.w/2;
  const cy = e.y + e.h/2;
  const attrs = e.attrs;
  const n = attrs.length;
  const radiusX = e.w * 0.9 + 30;
  const radiusY = Math.max(e.h * 1.5, 55) + n * 3;
  const startAngle = -Math.PI / 2;

  attrs.forEach((attr, i) => {
    const angle = startAngle + (2 * Math.PI * i) / n;
    const ax = cx + radiusX * Math.cos(angle);
    const ay = cy + radiusY * Math.sin(angle);

    // line from entity to attr
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', cx); line.setAttribute('y1', cy);
    line.setAttribute('x2', ax); line.setAttribute('y2', ay);
    line.setAttribute('stroke', 'rgba(129,140,248,0.25)');
    line.setAttribute('stroke-width', '1');
    world.appendChild(line);

    // ellipse
    const ell = document.createElementNS('http://www.w3.org/2000/svg','ellipse');
    ell.setAttribute('cx', ax); ell.setAttribute('cy', ay);
    ell.setAttribute('rx', 42); ell.setAttribute('ry', 14);
    ell.setAttribute('fill', 'rgba(99,102,241,0.15)');
    ell.setAttribute('stroke', '#818cf8');
    ell.classList.add('attr-ellipse');
    world.appendChild(ell);

    // label
    const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('x', ax); txt.setAttribute('y', ay);
    txt.classList.add('attr-label');
    if (attr === e.pk) txt.classList.add('pk');
    txt.textContent = attr;
    world.appendChild(txt);
  });
});

// draw entity rectangles (on top)
entities.forEach(e => {
  const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
  rect.setAttribute('x', e.x); rect.setAttribute('y', e.y);
  rect.setAttribute('width', e.w); rect.setAttribute('height', e.h);
  rect.setAttribute('fill', 'url(#entityGrad)');
  rect.setAttribute('stroke', '#60a5fa');
  rect.setAttribute('filter', 'url(#glow)');
  rect.classList.add('entity-rect');
  world.appendChild(rect);

  const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
  txt.setAttribute('x', e.x + e.w/2); txt.setAttribute('y', e.y + e.h/2);
  txt.classList.add('entity-label');
  txt.textContent = e.label;
  world.appendChild(txt);
});
</script>
</body>
</html>
